<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" fill="none">
  <!-- PUNTUAL — dark navy, condensed bold italic -->
  <text x="4" y="78"
    font-family="'Oswald','Arial Narrow','Impact','Helvetica Neue',Arial,sans-serif"
    font-weight="700"
    font-style="italic"
    font-size="68"
    fill="#1D2D5B"
    letter-spacing="1">PUNTUAL</text>

  <!-- Circle arc — almost complete, gap at bottom-left where text meets it -->
  <path d="M 234.5 37.6 A 42 42 0 1 1 233.6 66.8"
    stroke="#29A8E0" stroke-width="6" fill="none"
    stroke-linecap="round"/>

  <!-- Arrow inside circle — two triangular shapes, dark navy -->
  <polygon points="270,14  262,56  278,56" fill="#1D2D5B"/>
  <polygon points="256,60  284,60  270,52" fill="#1D2D5B"/>

  <!-- PAGO parallelogram band -->
  <path d="M 292 22 L 476 22 L 476 82 L 292 82 L 302 52 Z" fill="#29A8E0"/>

  <!-- PAGO text -->
  <text x="312" y="71"
    font-family="'Oswald','Arial Narrow','Impact','Helvetica Neue',Arial,sans-serif"
    font-weight="700"
    font-style="italic"
